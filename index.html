<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flashcard Tiếng Trung Pro - Anh Wang</title>
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --primary: #5cdb5c; --primary-dark: #4bba4b; --danger: #ff6b6b; --warning: #feca57; --blue: #3498db;
            --bg-color: #ffd6e8; --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2c3e50; --glass-blur: 15px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh;
            background-color: var(--bg-color); color: var(--text-main); transition: 0.3s;
            overflow: hidden; -webkit-tap-highlight-color: transparent;
        }

        #app-container { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; display: flex; flex-direction: column; align-items: center; }

        /* ================= UI DÙNG CHUNG ================= */
        .panel { background: white; padding: 20px; border-radius: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; width: 100%; max-width: 400px; box-sizing: border-box;}
        select, input[type="text"], textarea { outline: none; font-family: inherit; }
        
        /* ================= VIEW: HỌC BÀI ================= */
        #study-view { width: 100%; max-width: 400px; display: flex; flex-direction: column; align-items: center; }
        
        .header-info { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .streak-badge { background: white; padding: 5px 15px; border-radius: 20px; font-weight: 800; font-size: 13px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #e67e22; }

        .scene { width: 100%; height: 400px; perspective: 1000px; }
        .card { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; cursor: pointer; border-radius: 25px; }
        .card.is-flipped { transform: rotateY(180deg); }
        
        .card-face {
            position: absolute; width: 100%; height: 100%; -webkit-backface-visibility: hidden; backface-visibility: hidden;
            border-radius: 25px; background: var(--card-bg); backdrop-filter: blur(var(--glass-blur));
            display: flex; flex-direction: column; align-items: center; padding: 20px; box-sizing: border-box;
            border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .card-face-front { justify-content: flex-start; }
        .front-image { width: 100%; height: 80%; object-fit: cover; border-radius: 15px; background-color: #eee;}
        
        .card-face-back { transform: rotateY(180deg); overflow-y: auto; justify-content: center;}
        #hanzi-target { width: 120px; height: 120px; margin-top: 5px; border: 1px dashed #ccc; border-radius: 10px; }
        .pinyin { font-size: 26px; font-weight: bold; margin: 15px 0 10px 0; color: #34495e;}
        .meaning { font-size: 24px; font-weight: 900; color: #e74c3c; margin-bottom: 15px;}

        .action-buttons { display: flex; gap: 8px; margin-top: 15px; width: 100%; opacity: 0; pointer-events: none; transition: 0.3s; }
        .action-buttons.visible { opacity: 1; pointer-events: auto; }
        .action-buttons button { padding: 12px 5px; font-size: 13px; font-weight: bold; border: none; border-radius: 12px; color: white; flex: 1; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        
        .toggle-autoplay { margin-top: 15px; font-size: 13px; font-weight: bold; color: #7f8c8d; display: flex; align-items: center; gap: 5px;}
        
        /* ================= VIEW: NHẬP LIỆU ================= */
        #add-view { width: 100%; max-width: 400px; display: none; }
        textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 15px; font-size: 14px; background: #f9f9f9; resize: vertical; box-sizing: border-box;}
        
        .word-list-container { max-height: 450px; overflow-y: auto; margin-bottom: 15px; padding-right: 5px;}
        .preview-item { display: flex; background: white; border-radius: 15px; padding: 12px; margin-bottom: 12px; gap: 10px; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border: 1px solid #eee; position: relative;}
        .preview-inputs { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        .preview-inputs input { padding: 8px; border-radius: 8px; border: 1px solid transparent; font-size: 14px; background: #fdfdfd; transition: 0.2s; font-weight: 500;}
        .preview-inputs input:focus { border-color: var(--blue); background: white;}
        .preview-inputs input.editing { border: 1px solid #ddd; }
        
        .img-box { width: 70px; height: 70px; border-radius: 10px; background: #f1f2f6; cursor: pointer; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; flex-shrink: 0; border: 2px dashed #bdc3c7;}
        .img-box img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top:0; left:0; z-index: 1;}
        .img-box span { font-size: 20px; color: #95a5a6; z-index: 2;}

        .btn-del-card { position: absolute; top: -5px; right: -5px; background: var(--danger); color: white; border: none; border-radius: 50%; width: 22px; height: 22px; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10;}

        /* ================= VIEW: QUẢN LÝ ================= */
        #manage-view { width: 100%; max-width: 400px; display: none; }
        .stats-box { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); padding: 15px; border-radius: 15px; color: #2c3e50; margin-bottom: 15px; font-weight: bold; display: flex; justify-content: space-around; box-shadow: 0 4px 10px rgba(0,0,0,0.1);}
        .stats-box div { text-align: center; }
        .stats-box span { display: block; font-size: 22px; font-weight: 900;}

        /* TAB BAR */
        .tab-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; display: flex; background: white; border-top-left-radius: 20px; border-top-right-radius: 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); z-index: 100;}
        .tab-item { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 11px; font-weight: bold; color: #bdc3c7; cursor: pointer; transition: 0.2s;}
        .tab-item.active { color: var(--blue); transform: translateY(-2px);}
        .tab-icon { font-size: 22px; margin-bottom: 3px; }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="study-view">
            <div class="header-info">
                <div class="streak-badge" id="streak-display">🔥 Streak: 0 ngày</div>
            </div>
            
            <select id="study-deck-select" onchange="changeStudyDeck()" style="width:100%; padding:12px; border-radius:15px; border:none; margin-bottom:15px; font-weight:bold; box-shadow: 0 4px 10px rgba(0,0,0,0.05); background: white; color: var(--blue);"></select>

            <div class="scene" id="learning-area">
                <div class="card" id="flashcard" onclick="flipCard()">
                    <div class="card-face card-face-front">
                        <img id="front-image" class="front-image" src="" alt="Hình">
                        <p style="color:#95a5a6; font-size:14px; font-weight:bold; margin-top:20px;">👇 Chạm để lật thẻ</p>
                    </div>
                    <div class="card-face card-face-back">
                        <div id="hanzi-target"></div>
                        <div class="pinyin" id="back-pinyin"></div>
                        <div class="meaning" id="back-meaning"></div>
                        <button onclick="manualPlayAudio(event)" style="padding:8px 25px; border-radius:20px; border:1px solid #ddd; background:#f8f9fa; font-weight:bold; cursor:pointer; color:#2c3e50;">🔊 Đọc lại</button>
                    </div>
                </div>
            </div>

            <label class="toggle-autoplay">
                <input type="checkbox" id="autoplay-cb" checked> Tự động phát âm khi lật thẻ
            </label>

            <div class="action-buttons" id="action-buttons">
                <button class="btn-hard" style="background:var(--danger)" onclick="handleSRS(1)">Khó (Lặp lại)</button>
                <button class="btn-good" style="background:var(--warning); color:#333" onclick="handleSRS(3)">Bình thường</button>
                <button class="btn-easy" style="background:var(--primary-dark)" onclick="handleSRS(5)">Dễ (Nhớ lâu)</button>
            </div>
            <div id="stats" style="margin-top:15px; font-weight:bold; color: #7f8c8d;"></div>
        </div>

        <div id="add-view">
            <div id="step-1" class="panel">
                <h3 style="margin-top: 0; color: var(--blue);">Thêm Từ Nhanh</h3>
                <div style="display:flex; gap:10px; margin-bottom:15px;">
                    <select id="add-deck-select" style="flex:1; padding:10px; border-radius:10px; border: 1px solid #dfe6e9; font-weight:bold; color:var(--blue);"></select>
                    <button onclick="promptCreateDeck()" style="padding:0 15px; background:var(--blue); color:white; border:none; border-radius:10px; font-weight:bold;">+ Mới</button>
                </div>
                <p style="font-size:12px; color:#e67e22; font-weight:bold; margin-bottom: 5px;">Cú pháp: Chữ | Pinyin | Nghĩa</p>
                <textarea id="bulk-input" rows="7" placeholder="家 | jiā | Nhà&#10;书 | shū | Sách"></textarea>
                <button onclick="goToStep2()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:15px; margin-top:15px; font-weight:900; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3);">➡️ TIẾP TỤC: CHỌN ẢNH</button>
                
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button onclick="exportData()" style="flex:1; font-size:12px; padding:10px; border-radius:10px; border:1px solid #ddd; background:white; font-weight:bold;">📥 Xuất File</button>
                    <button onclick="document.getElementById('import-file').click()" style="flex:1; font-size:12px; padding:10px; border-radius:10px; border:1px solid #ddd; background:white; font-weight:bold;">📤 Nhập File</button>
                    <input type="file" id="import-file" style="display:none" onchange="importData(event)">
                </div>
            </div>

            <div id="step-2" style="display:none;">
                <div class="panel" style="display:flex; justify-content:space-between; align-items:center; padding:15px 20px;">
                    <h4 style="margin:0; color: #2c3e50;">Gắn ảnh & Chỉnh sửa</h4>
                    <button onclick="goBackToStep1()" style="background:none; border:none; color:var(--blue); text-decoration:underline; font-weight:bold; cursor:pointer;">Quay lại</button>
                </div>
                <div id="preview-list" class="word-list-container"></div>
                <button onclick="saveFinalData()" style="width:100%; padding:18px; background:var(--primary-dark); color:white; border:none; border-radius:20px; font-weight:900; box-shadow:0 5px 15px rgba(92,219,92,0.4);">✨ LƯU VÀO BỘ NHỚ</button>
            </div>
        </div>

        <div id="manage-view">
            <div class="panel">
                <h3 style="margin-top: 0; color: var(--blue);">Quản Lý Thẻ & Sửa Chữ</h3>
                <select id="manage-deck-select" onchange="renderManageList()" style="width:100%; padding:12px; border-radius:12px; border: 1px solid #dfe6e9; font-weight:bold; color:var(--blue); margin-bottom: 15px;"></select>
                
                <div class="stats-box" id="manage-stats">
                    <div>Tổng số<span>0</span></div>
                    <div>Đã nhớ<span>0</span></div>
                </div>

                <div id="manage-list" class="word-list-container"></div>
            </div>
        </div>
    </div>

    <div class="tab-bar">
        <div class="tab-item active" id="tab-study" onclick="switchTab('study')">
            <span class="tab-icon">📚</span><span>Học Bài</span>
        </div>
        <div class="tab-item" id="tab-add" onclick="switchTab('add')">
            <span class="tab-icon">✏️</span><span>Nhập Liệu</span>
        </div>
        <div class="tab-item" id="tab-manage" onclick="switchTab('manage')">
            <span class="tab-icon">⚙️</span><span>Quản Lý</span>
        </div>
    </div>

    <script>
        let appData = {}; let currentDeck = ""; let sessionCards = []; let currentIndex = 0; let writer;
        const defaultImg = "https://images.unsplash.com/photo-1515260268569-9271009adfdb?w=400";

        // ================= KHỞI TẠO ÂM THANH CHO iOS ================= //
        function initVoices() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.getVoices();
                if (speechSynthesis.onvoiceschanged !== undefined) {
                    speechSynthesis.onvoiceschanged = function() {
                        window.speechSynthesis.getVoices();
                    };
                }
            }
        }

        function playAudio(e) {
            if(e) e.stopPropagation();
            if ('speechSynthesis' in window) {
                // "Chống kẹt" cho Safari trên iOS
                window.speechSynthesis.cancel(); 
                
                // Cần độ trễ nhỏ để Safari kịp reset audio context
                setTimeout(() => {
                    const msg = new SpeechSynthesisUtterance(sessionCards[currentIndex].hanzi);
                    msg.lang = 'zh-CN'; 
                    msg.rate = 0.85; 
                    
                    // Tìm giọng tiếng Trung chính xác nếu có
                    const voices = window.speechSynthesis.getVoices();
                    const zhVoice = voices.find(v => v.lang.includes('zh') || v.lang.includes('CN'));
                    if (zhVoice) msg.voice = zhVoice;

                    window.speechSynthesis.speak(msg);
                }, 50);
            } else {
                console.log("Trình duyệt không hỗ trợ đọc giọng nói.");
            }
        }

        function manualPlayAudio(e) {
            playAudio(e);
        }

        // ================= SRS & STREAK ================= //
        function updateStreak() {
            const now = new Date(); const todayStr = now.toDateString();
            let lastDate = localStorage.getItem('lastStudyDate');
            let streak = parseInt(localStorage.getItem('streakCount')) || 0;

            if (lastDate !== todayStr) {
                const yesterday = new Date(); yesterday.setDate(yesterday.getDate() - 1);
                if (lastDate === yesterday.toDateString()) { streak++; } 
                else if (lastDate) { streak = 1; }
                localStorage.setItem('lastStudyDate', todayStr);
                localStorage.setItem('streakCount', streak);
            }
            document.getElementById('streak-display').innerText = `🔥 Streak: ${streak} ngày`;
        }

        function handleSRS(quality) {
            let card = sessionCards[currentIndex];
            let daysToAdd = 0;
            if (quality === 5) daysToAdd = 4;
            else if (quality === 3) daysToAdd = 1;
            
            if (quality > 1) {
                const nextDate = new Date();
                nextDate.setDate(nextDate.getDate() + daysToAdd);
                card.nextReview = nextDate.getTime();
            }

            const idx = appData[currentDeck].findIndex(c => c.hanzi === card.hanzi);
            if (idx > -1) { appData[currentDeck][idx].nextReview = card.nextReview; }
            saveToStorage();

            if (quality === 1) {
                sessionCards.push(sessionCards.splice(currentIndex, 1)[0]);
                loadCard();
            } else {
                currentIndex++;
                loadCard();
            }
        }

        // ================= UI & DATA KHỞI TẠO ================= //
        function initApp() {
            initVoices();
            const data = localStorage.getItem('anhwang_v17');
            appData = data ? JSON.parse(data) : { "Từ vựng Boya": [] };
            updateDeckSelectors();
            updateStreak();
        }

        function saveToStorage() { localStorage.setItem('anhwang_v17', JSON.stringify(appData)); }

        function switchTab(tab) {
            document.getElementById('study-view').style.display = tab === 'study' ? 'flex' : 'none';
            document.getElementById('add-view').style.display = tab === 'add' ? 'block' : 'none';
            document.getElementById('manage-view').style.display = tab === 'manage' ? 'block' : 'none';
            
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            
            if(tab === 'study') { startStudy(); } 
            else if (tab === 'add') { goBackToStep1(); }
            else if (tab === 'manage') { renderManageList(); }
        }

        function updateDeckSelectors() {
            const s1 = document.getElementById('study-deck-select');
            const s2 = document.getElementById('add-deck-select');
            const s3 = document.getElementById('manage-deck-select');
            s1.innerHTML = ''; s2.innerHTML = ''; s3.innerHTML = '';
            for(let k in appData) {
                const opt = `<option value="${k}">${k} (${appData[k].length} từ)</option>`;
                s1.innerHTML += opt; s3.innerHTML += opt;
                s2.innerHTML += `<option value="${k}">${k}</option>`;
            }
        }

        // ================= LOGIC HỌC BÀI ================= //
        function startStudy() {
            currentDeck = document.getElementById('study-deck-select').value;
            if (!appData[currentDeck]) return;
            const now = Date.now();
            sessionCards = appData[currentDeck].filter(c => !c.nextReview || c.nextReview <= now);
            currentIndex = 0;
            loadCard();
        }

        function loadCard() {
            if (currentIndex >= sessionCards.length) {
                document.getElementById('learning-area').style.display = 'none';
                document.getElementById('stats').innerText = "🎉 Hoàn thành bài học hôm nay!";
                document.getElementById('action-buttons').classList.remove('visible');
                return;
            }
            const card = sessionCards[currentIndex];
            document.getElementById('learning-area').style.display = 'block';
            document.getElementById('front-image').src = card.image_url || defaultImg;
            document.getElementById('back-pinyin').innerText = card.pinyin;
            document.getElementById('back-meaning').innerText = card.meaning;
            document.getElementById('stats').innerText = `Còn ${sessionCards.length - currentIndex} thẻ cần ôn`;
            document.getElementById('flashcard').classList.remove('is-flipped');
            document.getElementById('action-buttons').classList.remove('visible');
            
            document.getElementById('hanzi-target').innerHTML = '';
            writer = HanziWriter.create('hanzi-target', card.hanzi, {
                width: 120, height: 120, padding: 5, strokeAnimationSpeed: 1.5, delayBetweenStrokes: 150
            });
        }

        function flipCard() {
            const flashcard = document.getElementById('flashcard');
            if (!flashcard.classList.contains('is-flipped')) {
                flashcard.classList.add('is-flipped');
                document.getElementById('action-buttons').classList.add('visible');
                if (writer) writer.animateCharacter();
                
                // Tự động đọc
                if(document.getElementById('autoplay-cb').checked) {
                    playAudio(null);
                }
            }
        }

        // ================= LOGIC QUẢN LÝ & CHỈNH SỬA ================= //
        function renderManageList() {
            const deckName = document.getElementById('manage-deck-select').value;
            const listEl = document.getElementById('manage-list');
            listEl.innerHTML = '';
            if(!deckName || !appData[deckName]) return;

            const cards = appData[deckName];
            const now = Date.now();
            let mastered = cards.filter(c => c.nextReview && c.nextReview > now).length;
            
            document.getElementById('manage-stats').innerHTML = `
                <div>Tổng số<span>${cards.length}</span></div>
                <div>Đã nhớ (Dễ)<span>${mastered}</span></div>
            `;

            cards.forEach((w, i) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.innerHTML = `
                    <button class="btn-del-card" onclick="deleteOldCard('${deckName}', ${i})">✕</button>
                    <div class="preview-inputs">
                        <input type="text" value="${w.hanzi}" class="editing" onchange="updateOldCard('${deckName}', ${i}, 'hanzi', this.value)" placeholder="Chữ Hán">
                        <input type="text" value="${w.pinyin}" class="editing" onchange="updateOldCard('${deckName}', ${i}, 'pinyin', this.value)" placeholder="Pinyin">
                        <input type="text" value="${w.meaning}" class="editing" onchange="updateOldCard('${deckName}', ${i}, 'meaning', this.value)" placeholder="Nghĩa">
                    </div>
                    <div class="img-box" onclick="this.querySelector('input').click()">
                        <img src="${w.image_url || defaultImg}" style="display:block;" id="manage-img-${i}">
                        <input type="file" accept="image/*" style="display:none" onchange="uploadManageImg(this, '${deckName}', ${i})">
                    </div>
                `;
                listEl.appendChild(div);
            });
        }

        function updateOldCard(deck, index, field, value) { appData[deck][index][field] = value; saveToStorage(); }

        function deleteOldCard(deck, index) {
            if(confirm("Xóa thẻ này vĩnh viễn?")) {
                appData[deck].splice(index, 1); saveToStorage(); renderManageList(); updateDeckSelectors();
            }
        }

        function uploadManageImg(input, deck, index) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 300; let scale = 1;
                    if (img.width > MAX_WIDTH) { scale = MAX_WIDTH / img.width; }
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                    appData[deck][index].image_url = dataUrl; saveToStorage(); document.getElementById('manage-img-' + index).src = dataUrl;
                }
                img.src = e.target.result;
            };
            reader.readAsDataURL(file); input.value = "";
        }

        // ================= NHẬP LIỆU BƯỚC 1 -> 2 ================= //
        let tempWords = [];
        function goToStep2() {
            const text = document.getElementById('bulk-input').value.trim();
            if(!text) return alert("Anh chưa gõ chữ nào cả!");
            
            tempWords = text.split('\n').map(line => {
                const p = line.split('|').map(s => s.trim());
                return { hanzi: p[0], pinyin: p[1]||"", meaning: p[2]||"", image_url: defaultImg, nextReview: 0 };
            }).filter(w => w.hanzi !== "");

            if (tempWords.length === 0) return alert("Sai cú pháp rồi anh ơi!");

            const list = document.getElementById('preview-list');
            list.innerHTML = '';
            tempWords.forEach((w, i) => {
                const div = document.createElement('div'); div.className = 'preview-item';
                div.innerHTML = `
                    <div class="preview-inputs">
                        <input type="text" value="${w.hanzi}" class="editing" onchange="tempWords[${i}].hanzi=this.value" placeholder="Chữ Hán">
                        <input type="text" value="${w.pinyin}" class="editing" onchange="tempWords[${i}].pinyin=this.value" placeholder="Pinyin">
                        <input type="text" value="${w.meaning}" class="editing" onchange="tempWords[${i}].meaning=this.value" placeholder="Nghĩa">
                    </div>
                    <div class="img-box" onclick="this.querySelector('input').click()">
                        <img src="" id="prev-img-${i}"><span>📷</span>
                        <input type="file" accept="image/*" style="display:none" onchange="uploadRowImg(this, ${i})">
                    </div>
                `;
                list.appendChild(div);
            });
            document.getElementById('step-1').style.display = 'none'; document.getElementById('step-2').style.display = 'block';
        }

        function goBackToStep1() { document.getElementById('step-2').style.display = 'none'; document.getElementById('step-1').style.display = 'block'; }

        function uploadRowImg(input, i) {
            const file = input.files[0]; if(!file) return; const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const MAX_WIDTH = 300; let scale = 1;
                    if (img.width > MAX_WIDTH) { scale = MAX_WIDTH / img.width; }
                    canvas.width = img.width * scale; canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.6); 
                    tempWords[i].image_url = dataUrl;
                    const previewImg = document.getElementById('prev-img-' + i);
                    previewImg.src = dataUrl; previewImg.style.display = 'block';
                    input.parentElement.querySelector('span').style.display = 'none'; input.parentElement.style.border = 'none';
                }
                img.src = e.target.result;
            };
            reader.readAsDataURL(file); input.value = "";
        }

        function saveFinalData() {
            const deck = document.getElementById('add-deck-select').value; appData[deck] = appData[deck].concat(tempWords);
            saveToStorage(); updateDeckSelectors(); alert("Đã lưu thành công!");
            document.getElementById('bulk-input').value = ""; switchTab('study');
        }

        function promptCreateDeck() { const n = prompt("Tên thư mục mới:"); if(n) { appData[n] = []; saveToStorage(); updateDeckSelectors(); } }
        function exportData() { const blob = new Blob([JSON.stringify(appData)], {type: 'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'anhwang_chinese_backup.json'; a.click(); }
        function importData(e) { const file = e.target.files[0]; if(!file) return; const reader = new FileReader(); reader.onload = (ev) => { appData = JSON.parse(ev.target.result); saveToStorage(); updateDeckSelectors(); alert("Đã nhập dữ liệu thành công!"); }; reader.readAsDataURL(file); e.target.value = ""; }

        window.onload = initApp;
    </script>
</body>
</html>
